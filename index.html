<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="DD Learn">
  <meta id="themeColor" name="theme-color" content="#39a7ff">
  <link rel="apple-touch-icon" href="icon-192.png">
  <title id="pageTitle">まなびクエスト</title>
  <link rel="manifest" href="manifest.json">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <!-- Google Identity Services -->
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <!-- Chart.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" defer></script>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    *{-webkit-tap-highlight-color:transparent}
    button,a,[role=button]{touch-action:manipulation}
    :root{
      --sky:#b9ecff;--sky2:#77d5ff;--paper:rgba(255,255,255,.92);
      --ink:#26324d;--muted:#667085;--yellow:#ffd34d;
      --shadow:0 10px 0 rgba(41,70,108,.07),0 16px 28px rgba(41,70,108,.13);
      --font:'Noto Sans JP',system-ui,sans-serif;
      --sl:max(1rem,env(safe-area-inset-left));
      --sr:max(1rem,env(safe-area-inset-right));
      --sb:max(2rem,calc(env(safe-area-inset-bottom) + 1rem));
    }
    html{scroll-behavior:smooth}
    body{font-family:var(--font);color:var(--ink);min-height:100vh;overflow-x:hidden;background:transparent}

    /* ── 背景 ── */
    .bg-canvas{display:none}
    @keyframes float{from{transform:translateY(0)}to{transform:translateY(-14px)}}
    @keyframes pop{from{opacity:0;transform:translateY(18px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
    @keyframes wiggle{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
    @keyframes shine{from{transform:translateX(-120%) rotate(12deg)}to{transform:translateX(220%) rotate(12deg)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}

    /* ── ヘッダー ── */
    header{position:sticky;top:0;z-index:200;height:64px;padding:0 var(--sr) 0 var(--sl);display:flex;align-items:center;justify-content:space-between;gap:10px;background:rgba(255,255,255,.72);backdrop-filter:blur(16px);border-bottom:3px solid rgba(255,255,255,.9)}
    .logo{display:flex;align-items:center;flex-shrink:0;height:100%;padding:8px 0}
    .logo-img{height:100%;width:auto;max-height:42px;object-fit:contain;display:block}
    .header-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .header-badge{display:flex;align-items:center;gap:6px;background:#fff;border:3px solid #d8efff;color:#1769aa;border-radius:999px;padding:7px 12px;font-weight:900;font-size:.8rem;box-shadow:0 4px 0 #c9e8ff}
    .pulse-dot{width:9px;height:9px;border-radius:50%;background:#31d16b;box-shadow:0 0 0 4px rgba(49,209,107,.18)}

    /* ── Googleログインボタン ── */
    .btn-login{display:flex;align-items:center;gap:7px;background:#fff;border:2.5px solid #e0e0e0;color:#3c4043;border-radius:999px;padding:7px 14px;min-height:40px;font-family:inherit;font-size:.82rem;font-weight:700;cursor:pointer;box-shadow:0 3px 0 #e0e0e0;transition:.15s;white-space:nowrap}
    .btn-login:hover{background:#f8f8f8;box-shadow:0 4px 0 #d0d0d0;transform:translateY(-1px)}
    .btn-login svg{flex-shrink:0}

    /* ── ログイン済みユーザー表示 ── */
    .user-chip{display:flex;align-items:center;gap:8px;background:#fff;border:2.5px solid #d8efff;border-radius:999px;padding:5px 12px 5px 5px;box-shadow:0 3px 0 #c9e8ff;cursor:pointer}
    .user-avatar{width:30px;height:30px;border-radius:50%;object-fit:cover;border:2px solid #fff}
    .user-name{font-size:.8rem;font-weight:900;color:#1769aa;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .btn-logout{background:none;border:none;color:var(--muted);font-size:.75rem;cursor:pointer;padding:4px 6px;border-radius:6px}
    .btn-logout:hover{color:#e53e3e}

    /* ── メイン ── */
    main{position:relative;z-index:1;max-width:1160px;margin:0 auto;padding:1.75rem var(--sr) var(--sb) var(--sl)}

    /* ── ポイントダッシュボード（ログイン時のみ表示）── */
    #dashboard{display:none;background:linear-gradient(135deg,rgba(255,255,255,.95),rgba(232,246,255,.95));border:4px solid #fff;border-radius:28px;box-shadow:var(--shadow);padding:1.25rem 1.5rem;margin-bottom:1.5rem;animation:pop .5s ease-out both}
    #dashboard.visible{display:block}
    .dashboard-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;flex-wrap:wrap;gap:.5rem}
    .dashboard-title{font-size:1rem;font-weight:900;color:#1769aa;display:flex;align-items:center;gap:6px}
    .today-points{display:flex;align-items:center;gap:6px;background:#fff3c4;border:2.5px solid #ffe28a;border-radius:999px;padding:6px 14px;font-weight:900;font-size:.95rem;color:#7a4b00}
    .chart-wrap{position:relative;height:160px}

    /* ── ヒーロー ── */
    .hero{position:relative;display:flex;align-items:center;background:linear-gradient(135deg,rgba(255,255,255,.92),rgba(255,248,223,.95));border:4px solid #fff;border-radius:32px;box-shadow:var(--shadow);overflow:hidden;margin-bottom:1.25rem;animation:pop .55s ease-out both}
    .hero.has-banner{padding:0;min-height:auto;background:transparent;border:0;box-shadow:none;border-radius:0;overflow:visible}
    .hero.has-banner::before,.hero.has-banner::after{display:none}
    .hero-banner{display:block;width:100%;height:auto}
    .hero-text{display:grid;grid-template-columns:1.2fr .8fr;gap:1.5rem;align-items:center;padding:clamp(1.25rem,5vw,2.5rem);min-height:260px;width:100%}
    .hero:not(.has-banner) .hero-text{display:grid}
    .hero::before{content:'✦';position:absolute;top:22px;right:34%;font-size:2rem;color:#ffcf33}
    .hero::after{content:var(--mascot,'');position:absolute;right:clamp(1rem,6vw,5rem);bottom:10px;font-size:clamp(6rem,18vw,10rem);filter:drop-shadow(0 12px 0 rgba(39,50,77,.08));animation:float 2.2s ease-in-out infinite alternate}
    .hero-eyebrow{display:inline-flex;width:fit-content;background:#e6f7ff;color:#1574b8;border:3px solid #bcecff;border-radius:999px;padding:7px 14px;font-weight:900;margin-bottom:.9rem}
    .hero h1{font-size:clamp(1.75rem,6vw,3.6rem);font-weight:900;line-height:1.12;letter-spacing:.02em;margin-bottom:.8rem}
    .hero h1 em{font-style:normal;color:#ff8a00;text-shadow:0 4px 0 rgba(255,211,77,.4)}
    .hero p{max-width:560px;color:#4b5877;font-size:clamp(.92rem,2.2vw,1.05rem);line-height:1.85;font-weight:700}

    /* ── ミッションパネル ── */
    
    
    
    
    
    

    /* ── グループ ── */
    .group{margin-bottom:2rem;animation:pop .55s ease-out both}
    .group-header{display:flex;align-items:center;gap:12px;margin-bottom:1rem;padding-left:4px}
    .group-badge{display:flex;align-items:center;gap:8px;background:#fff;border:3px solid var(--group-color,#38bdf8);border-radius:999px;padding:7px 15px;box-shadow:0 4px 0 color-mix(in srgb,var(--group-color,#38bdf8) 60%,#000 40%)}
    .group-badge-icon{font-size:1.25rem}
    .group-badge-name{font-size:.95rem;font-weight:900;color:var(--ink)}
    .group.general .group-badge{background:linear-gradient(135deg,#f3f0ff,#ede9fe);border-color:#c4b5fd;box-shadow:0 4px 0 #a78bfa55}
    

    /* ── カード行 ── */
    .card-row{display:flex;gap:1rem;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;padding-bottom:6px;scrollbar-width:none;-ms-overflow-style:none}
    .card-row::-webkit-scrollbar{display:none}
    @media(min-width:700px){.card-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));overflow-x:visible;scroll-snap-type:none;padding-bottom:0}}

    /* ── カード ── */
    .app-card{position:relative;overflow:hidden;flex:0 0 205px;min-height:200px;background:var(--paper);border:4px solid #fff;border-radius:26px;padding:1.1rem;cursor:pointer;box-shadow:var(--shadow);scroll-snap-align:start;transition:.18s;animation:pop .55s ease-out both}
    @media(min-width:700px){.app-card{flex:unset}}
    .app-card::before{content:'';position:absolute;inset:0 0 auto 0;height:74px;background:var(--card-color,#38bdf8);opacity:.86}
    .app-card::after{content:'';position:absolute;top:-20%;left:-40%;width:42%;height:150%;background:rgba(255,255,255,.35);transform:rotate(12deg)}
    .app-card:hover{transform:translateY(-6px) rotate(-.8deg);box-shadow:0 18px 0 rgba(41,70,108,.08),0 20px 36px rgba(41,70,108,.18)}
    .app-card:hover::after{animation:shine .7s ease-out}
    .card-top{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:.85rem}
    .icon-wrap{width:58px;height:58px;border-radius:18px;display:flex;align-items:center;justify-content:center;background:#fff;border:4px solid rgba(255,255,255,.9);font-size:1.85rem;box-shadow:0 6px 0 rgba(41,70,108,.08)}
    .card-arrow{background:#fff;color:#1769aa;border-radius:999px;padding:8px 12px;min-height:44px;min-width:44px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.88rem;box-shadow:0 4px 0 rgba(41,70,108,.08)}
    .app-name{position:relative;z-index:1;font-size:1.02rem;font-weight:900;margin-bottom:.3rem}
    .app-desc{position:relative;z-index:1;color:#596579;line-height:1.6;font-weight:700;font-size:.83rem;min-height:58px}
    .card-tag{position:relative;z-index:1;display:inline-flex;margin-top:.8rem;color:#7a4b00;background:#fff3c4;border:2px solid #ffe28a;border-radius:999px;padding:5px 10px;font-size:.76rem;font-weight:900}
    .group.general .card-tag{color:#4c1d95;background:#ede9fe;border-color:#c4b5fd}

    /* ── ビューア ── */
    #viewer{display:none;position:fixed;inset:0;z-index:1000;flex-direction:column;background:#fff8df}
    .viewer-bar{min-height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 max(1rem,env(safe-area-inset-right)) 0 max(1rem,env(safe-area-inset-left));background:rgba(255,255,255,.9);border-bottom:4px solid #d8efff;gap:.75rem}
    .viewer-title-wrap{display:flex;align-items:center;gap:8px;min-width:0;font-weight:900;flex:1}
    #viewerIcon{font-size:1.3rem;flex-shrink:0}
    #viewerTitle{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:.95rem}
    .viewer-actions{display:flex;align-items:center;gap:8px;flex-shrink:0}

    /* 完了ボタン */
    .btn-done{display:flex;align-items:center;gap:5px;background:linear-gradient(180deg,#ffe26a,#ffae28);color:#5b3200;border:none;padding:9px 14px;min-height:44px;border-radius:999px;cursor:pointer;font-family:inherit;font-weight:900;font-size:.85rem;box-shadow:0 4px 0 #d78312;transition:.15s}
    .btn-done:hover{transform:translateY(-1px);box-shadow:0 5px 0 #d78312}
    .btn-done:active{transform:translateY(2px);box-shadow:0 2px 0 #d78312}
    /* ログイン時のみ表示 */
    .btn-done.hidden{display:none}

    .close-btn{display:flex;align-items:center;gap:5px;background:#fff;border:3px solid #ffd0dc;color:#d12c5c;padding:9px 14px;min-height:44px;border-radius:999px;cursor:pointer;font-family:inherit;font-weight:900;font-size:.85rem;box-shadow:0 4px 0 #ffc1d0;flex-shrink:0}
    #appFrame{flex:1;width:100%;border:none;background:white;padding-bottom:env(safe-area-inset-bottom)}
    footer{position:relative;z-index:1;text-align:center;padding:1.5rem 1rem;color:var(--muted);font-weight:700;font-size:.83rem}

    /* ── ポイントトースト ── */
    #toast{position:fixed;bottom:calc(env(safe-area-inset-bottom) + 80px);left:50%;transform:translateX(-50%) translateY(20px);background:#26324d;color:#fff;border-radius:999px;padding:12px 24px;font-weight:900;font-size:1rem;box-shadow:0 8px 24px rgba(0,0,0,.2);pointer-events:none;opacity:0;transition:opacity .3s,transform .3s;z-index:2000;white-space:nowrap}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    @media(max-width:760px){
      .hero-text{grid-template-columns:1fr;min-height:280px}
      .hero:not(.has-banner) .hero-text{padding-bottom:7.5rem}
      .hero::after{right:1rem;font-size:6rem}
      .header-badge{display:none}
    }

    /* Google公式ボタンのコンテナ */
    #googleBtnContainer{display:flex;align-items:center;min-height:40px}
    #googleBtnContainer > div{border-radius:999px !important}

    /* ログインティーザー */
    .login-teaser{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,#fff8df,#fff3c4);border:3px dashed #ffc94d;border-radius:24px;padding:1rem 1.25rem;margin-bottom:1.5rem;animation:pop .5s ease-out both}
    .login-teaser.hidden{display:none}
    .teaser-icon{font-size:1.8rem;flex-shrink:0}
    .teaser-title{font-size:.95rem;font-weight:900;color:#7a4b00;margin-bottom:2px}
    .teaser-sub{font-size:.8rem;color:#9a6520;font-weight:700;line-height:1.5}

    /* ── 教科別フィルター ── */
    .subject-filter{display:flex;gap:6px;overflow-x:auto;padding:0 0 8px 0;margin:0 0 .75rem 0;scrollbar-width:none;-ms-overflow-style:none}
    .subject-filter::-webkit-scrollbar{display:none}
    .filter-pill{display:flex;align-items:center;gap:5px;flex-shrink:0;background:#fff;border:2.5px solid #e5e7eb;color:#6b7280;border-radius:999px;padding:7px 14px;min-height:36px;font-family:inherit;font-size:.82rem;font-weight:900;cursor:pointer;transition:.15s;white-space:nowrap}
    .filter-pill:hover{border-color:#9ca3af;color:#374151}
    .filter-pill.active{background:var(--pill-color,#39a7ff);border-color:var(--pill-color,#39a7ff);color:#fff;box-shadow:0 3px 0 color-mix(in srgb,var(--pill-color,#39a7ff) 60%,#000 40%)}
    .filter-pill .pill-icon{font-size:1rem}

    /* ── インストール案内バナー（控えめ）── */
    .install-banner{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.92);border:2px solid #c7e9ff;border-radius:16px;padding:.55rem .8rem;margin-bottom:1rem;box-shadow:0 3px 0 rgba(41,70,108,.06);animation:fadeSlide .4s ease-out both}
    @keyframes fadeSlide{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    .install-banner-icon{font-size:1.3rem;flex-shrink:0}
    .install-banner-text{flex:1;min-width:0;line-height:1.3}
    .install-banner-title{font-weight:900;font-size:.85rem;color:#1769aa}
    .install-banner-sub{font-size:.72rem;color:#667085;font-weight:700;margin-top:1px}
    .install-banner-action{flex-shrink:0;background:#39a7ff;color:#fff;border:0;border-radius:999px;padding:6px 14px;min-height:32px;font-family:inherit;font-weight:900;font-size:.78rem;cursor:pointer;transition:.15s;white-space:nowrap}
    .install-banner-action:hover{background:#1f8fe6}
    .install-banner-action:active{transform:scale(.96)}
    .install-banner-close{flex-shrink:0;background:transparent;border:0;color:#9ca3af;font-size:1.3rem;font-weight:900;cursor:pointer;padding:0;width:28px;height:28px;border-radius:50%;line-height:1;display:flex;align-items:center;justify-content:center}
    .install-banner-close:hover{background:#f3f4f6;color:#374151}

    /* インストール済みなら自動で隠す */
    @media(display-mode:standalone){.install-banner{display:none !important}}
  </style>
</head>
<body>
  <div class="bg-canvas">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <header>
    <div class="logo">
      <img class="logo-img" src="assets/logo.png" alt="DD Learn" id="logoImg">
    </div>
    <div class="header-right">
      <div class="header-badge" id="statusBadge">
        <span class="pulse-dot"></span>
        <span id="cfg-tagline">今日も冒険中</span>
      </div>
      <!-- ログイン前 (Google公式ボタンが描画される) -->
      <div id="googleBtnContainer"></div>
      <!-- ログイン後（初期非表示）-->
      <div class="user-chip" id="userChip" style="display:none" onclick="toggleLogout()">
        <img class="user-avatar" id="userAvatar" src="" alt="avatar">
        <span class="user-name" id="userName"></span>
      </div>
      <button class="btn-logout" id="btnLogout" style="display:none" onclick="doLogout()">ログアウト</button>
    </div>
  </header>

  <main>
    <!-- 0. インストール案内バナー（ヘッダー下、控えめ表示）-->
    <div id="installBanner" class="install-banner" hidden>
      <div class="install-banner-icon">📱</div>
      <div class="install-banner-text">
        <div class="install-banner-title">アプリとしてつかえるよ</div>
        <div class="install-banner-sub">ホーム画面に追加するとサクサク</div>
      </div>
      <button class="install-banner-action" type="button" onclick="handleInstall()">追加</button>
      <button class="install-banner-close" type="button" onclick="dismissInstall()" aria-label="閉じる">×</button>
    </div>

    <!-- 1. ヒーロー（最上部）-->
    <section class="hero" id="hero">
      <!-- 画像版（heroBannerが設定されている時にJSで表示）-->
      <img id="heroBannerImg" class="hero-banner" alt="" hidden>
      <!-- テキスト版（heroBannerが空の時にJSで表示）-->
      <div class="hero-text" id="heroText">
        <div class="hero-eyebrow" id="cfg-eyebrow">🎒 きょうのぼうけん</div>
        <h1 id="cfg-heroTitle">勉強して、<em>宝箱を<br>あけよう！</em></h1>
        <p id="cfg-heroDesc">カードをえらぶだけでスタート。1回5〜10分の小さなミッションで、星とバッジを集めよう。</p>
      </div>
    </section>

    <!-- 2a. 未ログイン時のティーザー -->
    <div id="loginTeaser" class="login-teaser">
      <div class="teaser-icon">🔒</div>
      <div class="teaser-text">
        <div class="teaser-title">ログインすると成果が見えるよ！</div>
        <div class="teaser-sub">きょうのポイントと、1週間のがんばりグラフが表示されます。</div>
      </div>
    </div>

    <!-- 2b. ポイントダッシュボード（ログイン時のみ）-->
    <div id="dashboard">
      <div class="dashboard-header">
        <div class="dashboard-title">📊 <span id="dashboardTitle">きょうのせいか</span></div>
        <div class="today-points">⭐ <span id="todayPts">0</span> <span id="todayLabel">ポイント</span></div>
      </div>
      <!-- 教科別フィルター -->
      <div class="subject-filter" id="subjectFilter">
        <!-- ピルはJSで生成 -->
      </div>
      <div class="chart-wrap">
        <canvas id="pointsChart"></canvas>
      </div>
    </div>

    <!-- 3. 教科グループ -->
    <div id="appRoot"></div>
  </main>

  <footer id="cfg-footer">© 2026 まなびクエスト — 小学生向けMVP</footer>

  <!-- ビューア -->
  <div id="viewer">
    <div class="viewer-bar">
      <div class="viewer-title-wrap">
        <span id="viewerIcon"></span>
        <span id="viewerTitle"></span>
      </div>
      <div class="viewer-actions">
        <button class="btn-done hidden" id="btnDone" type="button" onclick="completeApp()">
          ⭐ 完了！
        </button>
        <button class="close-btn" type="button" onclick="closeApp()">
          <svg width="13" height="13" viewBox="0 0 14 14" fill="none">
            <path d="M1 1l12 12M13 1L1 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          閉じる
        </button>
      </div>
    </div>
    <iframe id="appFrame" src="" title="アプリ"></iframe>
  </div>

  <!-- ポイントトースト -->
  <div id="toast"></div>

  <script>
    // =========================================================
    // 状態管理
    // =========================================================
    let CFG      = {};       // config.json
    let currentUser = null;  // { uid, name, avatar } | null
    let currentApp  = null;  // 現在ビューアで開いているアプリ情報
    let chart    = null;     // Chart.js インスタンス
    let currentFilter = 'all'; // 'all' or グループID
    let SUBJECT_GROUPS = []; // フィルター対象の教科グループ一覧（apps.jsonからセット）

    // =========================================================
    // Service Worker
    // =========================================================
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});

    // =========================================================
    // localStorage ヘルパー（uid をキーに使う）
    // =========================================================
    const STORAGE_PREFIX = 'mq_';

    function storageKey(uid) {
      return STORAGE_PREFIX + uid + '_points';
    }

    function loadPoints(uid) {
      try {
        const raw = JSON.parse(localStorage.getItem(storageKey(uid)) || '{}');
        // 旧フォーマット（数値）→ 新フォーマット（教科別）への移行
        const migrated = {};
        for (const [date, val] of Object.entries(raw)) {
          if (typeof val === 'number') {
            migrated[date] = { _legacy: val };
          } else if (val && typeof val === 'object') {
            migrated[date] = val;
          }
        }
        return migrated;
      } catch { return {}; }
    }

    function savePoints(uid, data) {
      localStorage.setItem(storageKey(uid), JSON.stringify(data));
    }

    function todayKey() {
      return new Date().toISOString().slice(0, 10);
    }

    // 教科別にポイントを加算
    function addPoints(uid, subjectId, pts) {
      const data  = loadPoints(uid);
      const today = todayKey();
      if (!data[today]) data[today] = {};
      data[today][subjectId] = (data[today][subjectId] || 0) + pts;
      savePoints(uid, data);
      return getDayTotal(data[today]);
    }

    // ある日の合計（全教科の和）
    function getDayTotal(dayData) {
      if (!dayData) return 0;
      return Object.values(dayData).reduce((a, b) => a + (b || 0), 0);
    }

    // ある日の特定教科のポイント。subjectId === 'all' なら合計
    function getDaySubject(dayData, subjectId) {
      if (!dayData) return 0;
      if (subjectId === 'all') return getDayTotal(dayData);
      return dayData[subjectId] || 0;
    }

    // =========================================================
    // Google Identity Services
    // =========================================================
    // Google SDK が読み込まれるまで待つ
    function waitForGoogleSDK(timeoutMs = 6000) {
      return new Promise((resolve) => {
        if (window.google?.accounts?.id) return resolve(true);
        const start = Date.now();
        const timer = setInterval(() => {
          if (window.google?.accounts?.id) {
            clearInterval(timer);
            resolve(true);
          } else if (Date.now() - start > timeoutMs) {
            clearInterval(timer);
            resolve(false);
          }
        }, 80);
      });
    }

    async function initGoogle(clientId) {
      if (!clientId || clientId.includes('YOUR_CLIENT_ID')) {
        console.warn('googleClientId が未設定です。');
        return;
      }
      const ok = await waitForGoogleSDK();
      if (!ok) {
        console.error('Google SDK の読み込みに失敗しました。');
        return;
      }

      google.accounts.id.initialize({
        client_id: clientId,
        callback: onGoogleCredential,
        auto_select: true,
        cancel_on_tap_outside: false,
        use_fedcm_for_prompt: true,
      });

      // 公式 Sign-In ボタンを描画（クリックが確実に動作）
      const container = document.getElementById('googleBtnContainer');
      if (container) {
        google.accounts.id.renderButton(container, {
          type: 'standard',
          theme: 'outline',
          size: 'medium',
          text: 'signin_with',
          shape: 'pill',
          logo_alignment: 'left',
        });
      }

      // One Tap も併用（前回ログイン済みなら自動表示）
      try { google.accounts.id.prompt(); } catch (e) { /* noop */ }
    }

    function onGoogleCredential(response) {
      // JWT をデコード（署名検証はサーバーで行うべきだが、
      // ユーザー情報をローカル保存するだけなのでクライアント側デコードで十分）
      const payload = JSON.parse(atob(response.credential.split('.')[1]));
      currentUser = {
        uid:    payload.sub,   // Google UID（個人情報ではなく識別子として使用）
        name:   payload.name,
        avatar: payload.picture,
      };
      onLoginSuccess();
    }

    function onLoginSuccess() {
      document.getElementById('googleBtnContainer').style.display = 'none';
      document.getElementById('userChip').style.display  = 'flex';
      document.getElementById('btnLogout').style.display = 'none';
      document.getElementById('userAvatar').src = currentUser.avatar;
      document.getElementById('userName').textContent = currentUser.name;

      // 完了ボタン表示・ティーザー非表示・ダッシュボード表示
      document.getElementById('btnDone').classList.remove('hidden');
      document.getElementById('loginTeaser').classList.add('hidden');
      document.getElementById('dashboard').classList.add('visible');
      renderFilterPills();
      renderChart();
    }

    function toggleLogout() {
      const btn = document.getElementById('btnLogout');
      btn.style.display = btn.style.display === 'none' ? 'block' : 'none';
    }

    function doLogout() {
      window.google?.accounts.id.disableAutoSelect();
      currentUser = null;
      document.getElementById('googleBtnContainer').style.display = 'flex';
      document.getElementById('userChip').style.display  = 'none';
      document.getElementById('btnLogout').style.display = 'none';
      document.getElementById('btnDone').classList.add('hidden');
      document.getElementById('dashboard').classList.remove('visible');
      document.getElementById('loginTeaser').classList.remove('hidden');
    }

    // =========================================================
    // 折れ線グラフ
    // =========================================================
    function renderChart() {
      if (!currentUser) return;
      const days = CFG.pointsChartDays || 7;
      const data = loadPoints(currentUser.uid);
      const subjectId = currentFilter;

      // フィルター対象の色を決定
      let lineColor = '#39a7ff';
      if (subjectId !== 'all') {
        const grp = SUBJECT_GROUPS.find(g => g.id === subjectId);
        if (grp) lineColor = grp.color;
      }

      // 過去N日のラベルと値
      const labels = [], values = [];
      for (let i = days - 1; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const key   = d.toISOString().slice(0, 10);
        const label = `${d.getMonth() + 1}/${d.getDate()}`;
        labels.push(label);
        values.push(getDaySubject(data[key], subjectId));
      }

      // 今日のポイント数を更新
      document.getElementById('todayPts').textContent = getDaySubject(data[todayKey()], subjectId);

      // ラベルも更新
      const labelEl = document.getElementById('todayLabel');
      if (labelEl) {
        if (subjectId === 'all') {
          labelEl.textContent = 'ポイント';
        } else {
          const grp = SUBJECT_GROUPS.find(g => g.id === subjectId);
          labelEl.textContent = grp ? `pt（${grp.name}）` : 'ポイント';
        }
      }

      const ctx = document.getElementById('pointsChart').getContext('2d');
      if (chart) chart.destroy();

      // 色をHEXからRGBA(.12)へ変換するヘルパー
      const toRgba = (hex, a) => {
        const m = hex.match(/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i);
        if (!m) return `rgba(57,167,255,${a})`;
        return `rgba(${parseInt(m[1],16)},${parseInt(m[2],16)},${parseInt(m[3],16)},${a})`;
      };

      chart = new Chart(ctx, {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label: 'ポイント',
            data: values,
            borderColor: lineColor,
            backgroundColor: toRgba(lineColor, 0.12),
            borderWidth: 3,
            pointBackgroundColor: values.map((v, i) => i === values.length - 1 ? '#ff8a00' : lineColor),
            pointRadius: values.map((v, i) => i === values.length - 1 ? 7 : 4),
            pointBorderColor: '#fff',
            pointBorderWidth: 2,
            fill: true,
            tension: 0.4,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: ctx => `⭐ ${ctx.parsed.y} pt` } }
          },
          scales: {
            x: { grid: { display: false }, ticks: { font: { family: "'Noto Sans JP'", size: 11 } } },
            y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,.06)' }, ticks: { font: { family: "'Noto Sans JP'", size: 11 }, precision: 0 } }
          }
        }
      });
    }

    // フィルターピル生成
    function renderFilterPills() {
      const container = document.getElementById('subjectFilter');
      if (!container) return;
      const pills = [
        { id: 'all', name: 'ぜんぶ', icon: '⭐', color: '#39a7ff' },
        ...SUBJECT_GROUPS.map(g => ({ id: g.id, name: g.name, icon: g.icon, color: g.color }))
      ];
      container.innerHTML = '';
      pills.forEach(p => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'filter-pill' + (p.id === currentFilter ? ' active' : '');
        btn.style.setProperty('--pill-color', p.color);
        btn.dataset.subject = p.id;
        btn.innerHTML = `<span class="pill-icon">${p.icon}</span><span>${p.name}</span>`;
        btn.onclick = () => {
          currentFilter = p.id;
          renderFilterPills();   // active状態を更新
          renderChart();         // チャートと今日のポイント更新
        };
        container.appendChild(btn);
      });
    }

    // =========================================================
    // ビューア
    // =========================================================
    function openApp(url, name, icon, pts, subjectId) {
      currentApp = { url, name, icon, pts: pts || 0, subjectId: subjectId || '_other' };
      document.getElementById('appFrame').src = url;
      document.getElementById('viewerTitle').textContent = name;
      document.getElementById('viewerIcon').textContent  = icon || '📄';
      document.getElementById('viewer').style.display = 'flex';
      document.body.style.overflow = 'hidden';
      document.body.style.overscrollBehavior = 'none';
    }

    function closeApp() {
      document.getElementById('viewer').style.display = 'none';
      document.getElementById('appFrame').src = '';
      document.body.style.overflow = '';
      document.body.style.overscrollBehavior = '';
      currentApp = null;
    }

    function completeApp() {
      if (!currentUser || !currentApp) return;
      const earned = currentApp.pts;
      if (earned <= 0) {
        // 便利ツール（ポイント加算なし）
        showToast('お疲れさま！');
        closeApp();
        return;
      }
      const total = addPoints(currentUser.uid, currentApp.subjectId, earned);
      showToast(`⭐ +${earned} ポイント！ きょうの合計: ${total}pt`);
      renderChart();
      closeApp();
    }

    // =========================================================
    // トースト通知
    // =========================================================
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    // =========================================================
    // カード生成
    // =========================================================
    function makeCard(app, group, delay) {
      const card = document.createElement('div');
      card.className = 'app-card';
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');
      card.setAttribute('aria-label', app.name + 'を開く');
      card.style.setProperty('--card-color', group.color || '#38bdf8');
      card.style.animationDelay = delay + 's';

      const pts = app.reward ? parseInt(app.reward.replace(/[^0-9]/g, ''), 10) || 10 : 0;
      const subjectId = group.type === 'subject' ? group.id : '_other';
      card.onclick = () => openApp(app.url, app.name, app.icon, pts, subjectId);
      card.onkeydown = e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openApp(app.url, app.name, app.icon, pts, subjectId); }
      };
      const tagReward = app.reward ? ' ・ ' + app.reward : '';
      card.innerHTML = `
        <div class="card-top">
          <div class="icon-wrap">${app.icon}</div>
          <div class="card-arrow">出発</div>
        </div>
        <div class="app-name">${app.name}</div>
        <div class="app-desc">${app.description}</div>
        <div class="card-tag">${app.level || 'ミッション'}${tagReward}</div>
      `;
      return card;
    }

    // =========================================================
    // apps.json 読み込み
    // =========================================================
    async function loadApps() {
      const root = document.getElementById('appRoot');
      try {
        const res    = await fetch('./apps.json');
        const groups = await res.json();
        root.innerHTML = '';
        // 教科グループのみフィルターピル用に保存
        SUBJECT_GROUPS = groups.filter(g => g.type === 'subject');
        let delay = 0.1;
        groups.forEach(group => {
          const section = document.createElement('section');
          section.className = 'group' + (group.type === 'general' ? ' general' : '');
          section.style.setProperty('--group-color', group.color || '#38bdf8');
          section.setAttribute('aria-label', group.name);
          section.innerHTML = `
            <div class="group-header">
              <div class="group-badge">
                <span class="group-badge-icon">${group.icon}</span>
                <span class="group-badge-name">${group.name}</span>
              </div>
            </div>
          `;
          const row = document.createElement('div');
          row.className = 'card-row';
          group.apps.forEach(app => {
            row.appendChild(makeCard(app, group, delay));
            delay += 0.06;
          });
          section.appendChild(row);
          root.appendChild(section);
        });
      } catch (e) {
        root.innerHTML = '<p style="color:#667085;padding:2rem;font-weight:900;">⚠️ apps.json の読み込みに失敗しました。</p>';
        console.error(e);
      }
    }

    // =========================================================
    // config.json 読み込み → 全体初期化
    // =========================================================

    // =========================================================
    // PWA インストール
    // =========================================================
    let deferredInstallPrompt = null;

    function isStandalone() {
      return window.matchMedia('(display-mode: standalone)').matches
          || window.navigator.standalone === true;
    }
    function isInstallDismissed() {
      return localStorage.getItem('mq_install_dismissed') === '1';
    }

    // Chrome/Edge/Android: beforeinstallprompt をキャプチャ
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredInstallPrompt = e;
      // 5秒待ってから表示（操作のジャマをしない）
      setTimeout(() => showInstallBanner(), 5000);
    });

    // インストール完了時はバナーを消す
    window.addEventListener('appinstalled', () => {
      deferredInstallPrompt = null;
      hideInstallBanner();
    });

    function showInstallBanner() {
      if (isStandalone()) return;
      if (isInstallDismissed()) return;
      const el = document.getElementById('installBanner');
      if (el) el.hidden = false;
    }
    function hideInstallBanner() {
      const el = document.getElementById('installBanner');
      if (el) el.hidden = true;
    }

    function handleInstall() {
      if (deferredInstallPrompt) {
        // Chrome / Android: ネイティブのインストールダイアログを起動
        deferredInstallPrompt.prompt();
        deferredInstallPrompt.userChoice.then(() => {
          deferredInstallPrompt = null;
          hideInstallBanner();
        });
      } else {
        // インストールAPIが使えない環境（iOS Safari等）はバナーを閉じるだけ
        dismissInstall();
      }
    }
    function dismissInstall() {
      localStorage.setItem('mq_install_dismissed', '1');
      hideInstallBanner();
    }

    // 初期化（インストール済み or 却下済みなら何もしない）
    function initInstallUI() {
      // beforeinstallprompt イベント発火を待つ。
      // 発火しない環境（iOS等）ではバナーは表示しない。
    }

    async function loadConfig() {
      try {
        const res = await fetch('./config.json');
        CFG = await res.json();

        document.getElementById('pageTitle').textContent = CFG.appName || 'まなびクエスト';
        const tm = document.getElementById('themeColor');
        if (tm && CFG.themeColor) tm.setAttribute('content', CFG.themeColor);
        document.documentElement.style.setProperty('--mascot', `'${CFG.mascot || ''}'`);

        const set = (id, val) => { const el = document.getElementById(id); if (el && val) el.innerHTML = val; };
        set('cfg-appName',      CFG.appName);
        set('cfg-subtitle',     CFG.appSubtitle);
        set('cfg-tagline',      CFG.appTagline);
        set('cfg-eyebrow',      CFG.heroEyebrow);
        set('cfg-footer',       CFG.footerText);

        const titleEl = document.getElementById('cfg-heroTitle');
        if (titleEl && CFG.heroTitle && CFG.heroTitleEm) {
          titleEl.innerHTML = `${CFG.heroTitle}<em>${CFG.heroTitleEm}</em>`;
        }
        set('cfg-heroDesc', CFG.heroDesc);

        // ヒーローバナー画像の制御
        const heroEl   = document.getElementById('hero');
        const bannerEl = document.getElementById('heroBannerImg');
        const textEl   = document.getElementById('heroText');
        if (CFG.heroBanner) {
          bannerEl.src = CFG.heroBanner;
          bannerEl.alt = CFG.appName || 'DD Learn';
          bannerEl.hidden = false;
          textEl.style.display = 'none';
          heroEl.classList.add('has-banner');
        } else {
          bannerEl.hidden = true;
          textEl.style.display = '';
          heroEl.classList.remove('has-banner');
        }

        // Google 初期化
        initGoogle(CFG.googleClientId);

      } catch (e) {
        console.warn('config.json 読み込み失敗。デフォルト値を使用します。', e);
      }
      loadApps();
    }

    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeApp(); });
    initInstallUI();
    loadConfig();
  </script>
</body>
</html>
